<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Register | IntelliResume AI</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

body{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
background:linear-gradient(120deg,#43cea2,#185a9d);
font-family:'Poppins',sans-serif;
}

/* Card */

.register-card{
width:430px;
padding:50px 45px;
border-radius:22px;
background:rgba(255,255,255,0.18);
backdrop-filter: blur(18px);
box-shadow:0 20px 50px rgba(0,0,0,0.25);
color:white;
animation:fadeIn 0.8s ease;
}

/* Animation */

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(15px);
}
to{
opacity:1;
transform:translateY(0);
}
}

/* Logo */

.logo{
font-size:34px;
text-align:center;
margin-bottom:10px;
}

/* Titles */

.title{
font-size:26px;
font-weight:600;
text-align:center;
margin-bottom:5px;
}

.subtitle{
text-align:center;
font-size:14px;
opacity:0.9;
margin-bottom:20px;
}

/* Labels */

label{
font-size:14px;
font-weight:500;
margin-bottom:5px;
}

/* Inputs */

.form-control{
border-radius:12px;
padding:12px;
border:none;
outline:none;
box-shadow:none;
}

.form-control:focus{
border:2px solid #ffffff;
box-shadow:none;
}

/* Button */

.btn-main{
background:white;
color:#185a9d;
font-weight:600;
border-radius:12px;
padding:12px;
margin-top:10px;
transition:all 0.3s;
}

.btn-main:hover{
background:#f5f5f5;
transform:translateY(-2px);
box-shadow:0 6px 15px rgba(0,0,0,0.2);
}

/* Divider */

.divider{
display:flex;
align-items:center;
text-align:center;
margin:25px 0;
font-size:13px;
opacity:0.8;
}

.divider::before,
.divider::after{
content:'';
flex:1;
border-bottom:1px solid rgba(255,255,255,0.4);
}

.divider:not(:empty)::before{
margin-right:.5em;
}

.divider:not(:empty)::after{
margin-left:.5em;
}

/* Login link */

.bottom-text{
text-align:center;
font-size:14px;
}

.bottom-text a{
color:white;
font-weight:600;
text-decoration:none;
}

.bottom-text a:hover{
text-decoration:underline;
}

/* Flash alert styling */

.alert{
margin-bottom:20px;
font-size:14px;
border-radius:10px;
}

</style>

</head>

<body>

<div class="register-card">

<div class="logo">🤖</div>

<div class="title">Create Account</div>

<div class="subtitle">Join IntelliResume AI</div>


<!-- SHOW ONLY LATEST FLASH MESSAGE -->

{% with messages = get_flashed_messages(with_categories=true) %}
{% if messages %}
{% set category, message = messages[-1] %}

<div class="alert alert-{{category}} alert-dismissible fade show text-center">

{{ message }}

<button type="button" class="btn-close" data-bs-dismiss="alert"></button>

</div>

{% endif %}
{% endwith %}


<form method="POST">

<div class="mb-3">
<label>Username</label>
<input type="text" name="username" class="form-control" placeholder="Enter your username" required>
</div>

<div class="mb-3">
<label>Email Address</label>
<input type="email" name="email" class="form-control" placeholder="Enter your email" required>
</div>

<div class="mb-3">
<label>Password</label>
<input type="password" name="password" class="form-control" placeholder="Create a password" required>
</div>

<button class="btn btn-main w-100">
Register
</button>

</form>

<div class="divider">or</div>

<div class="bottom-text">
Already have an account?  
<a href="/">Login</a>
</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
